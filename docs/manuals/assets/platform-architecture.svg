<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 500" role="img" aria-labelledby="title desc">
  <title id="title">QuakeKit platform architecture</title>
  <desc id="desc">Layered architecture from DK hardware through HID adapters, runtime, plugin API, host apps, and plugins.</desc>
  <defs>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#08111f"/>
      <stop offset="1" stop-color="#141c34"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0a1020" flood-opacity=".22"/>
    </filter>
  </defs>
  <rect width="980" height="500" rx="24" fill="#f5f7fb"/>
  <g filter="url(#shadow)">
    <rect x="56" y="50" width="868" height="78" rx="16" fill="#101624"/>
    <text x="90" y="83" fill="#39f5ff" font-family="Menlo,monospace" font-size="20" font-weight="700">DK-QUAKE / ARIS-68 Hardware</text>
    <text x="90" y="108" fill="#dce7ff" font-family="-apple-system,Segoe UI,sans-serif" font-size="15">External display + HID touch + control interface + knob LED ring</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="56" y="162" width="260" height="116" rx="16" fill="url(#panel)"/>
    <text x="84" y="198" fill="#ffffff" font-family="-apple-system,Segoe UI,sans-serif" font-size="20" font-weight="700">QuakeHID</text>
    <text x="84" y="225" fill="#c9d6ee" font-family="-apple-system,Segoe UI,sans-serif" font-size="14">IOKit transport, wake, keep-alive, safe commands, runtime events</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="360" y="162" width="260" height="116" rx="16" fill="url(#panel)"/>
    <text x="388" y="198" fill="#ffffff" font-family="-apple-system,Segoe UI,sans-serif" font-size="20" font-weight="700">QuakeRuntime</text>
    <text x="388" y="225" fill="#c9d6ee" font-family="-apple-system,Segoe UI,sans-serif" font-size="14">Pages, widgets, event bus, actions, data snapshots, LED arbitration</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="664" y="162" width="260" height="116" rx="16" fill="url(#panel)"/>
    <text x="692" y="198" fill="#ffffff" font-family="-apple-system,Segoe UI,sans-serif" font-size="20" font-weight="700">QuakePluginAPI</text>
    <text x="692" y="225" fill="#c9d6ee" font-family="-apple-system,Segoe UI,sans-serif" font-size="14">Manifest schemas, permissions, settings, package discovery</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="56" y="330" width="412" height="104" rx="16" fill="#ffffff" stroke="#d8deea"/>
    <text x="84" y="366" fill="#161a22" font-family="-apple-system,Segoe UI,sans-serif" font-size="20" font-weight="700">macOS Host App</text>
    <text x="84" y="392" fill="#5f6877" font-family="-apple-system,Segoe UI,sans-serif" font-size="14">AppKit panel, menu bar accessory, settings window, audio services, package installer</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="512" y="330" width="412" height="104" rx="16" fill="#ffffff" stroke="#d8deea"/>
    <text x="540" y="366" fill="#161a22" font-family="-apple-system,Segoe UI,sans-serif" font-size="20" font-weight="700">Themes + Functional Plugins</text>
    <text x="540" y="392" fill="#5f6877" font-family="-apple-system,Segoe UI,sans-serif" font-size="14">Swift, web, shell, PHP, stdio JSON-RPC, service adapters, visual theme packages</text>
  </g>
  <g stroke="#0a84ff" stroke-width="4" stroke-linecap="round">
    <path d="M186 130v30"/>
    <path d="M316 220h44"/>
    <path d="M620 220h44"/>
    <path d="M490 278v52"/>
    <path d="M794 278v52"/>
  </g>
</svg>
