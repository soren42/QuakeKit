name: Bug report
description: Report a reproducible bug in the Swift code, probe, plugin API, or panel host.
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List exact commands and actions.
      placeholder: |
        1. Run `swift build`
        2. Run `.build/debug/quake-probe --listen --wake`
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      render: text
    validations:
      required: false
  - type: input
    id: commit
    attributes:
      label: Commit or branch
    validations:
      required: false
