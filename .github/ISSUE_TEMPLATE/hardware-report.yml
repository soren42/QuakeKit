name: Hardware report
description: Report DK-Quake behavior on a specific Mac / macOS setup.
title: "[Hardware]: "
labels: ["hardware", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for testing. Hardware reports are especially useful while the native host is young.
  - type: input
    id: mac-model
    attributes:
      label: Mac model
      description: Example: MacBook Pro M4 Pro, Mac mini M2, etc.
    validations:
      required: true
  - type: input
    id: macos-version
    attributes:
      label: macOS version
      description: Example: macOS 26.0, macOS 15.5, etc.
    validations:
      required: true
  - type: textarea
    id: display-info
    attributes:
      label: DK display info
      description: Paste the DK-Quake display section from System Information or Display Settings.
      render: text
    validations:
      required: true
  - type: textarea
    id: all-hid
    attributes:
      label: quake-probe --all-hid output
      description: Run `.build/debug/quake-probe --all-hid` and paste the output.
      render: text
    validations:
      required: true
  - type: checkboxes
    id: behavior
    attributes:
      label: What works?
      options:
        - label: Control interface connects
        - label: Touch interface connects
        - label: Touch events print in `quake-probe --listen --wake`
        - label: Knob rotation/press events print
        - label: Keep-alive pong prints
        - label: Knob LED turns on with `--led-on`
        - label: Knob LED turns off with `--led-off`
        - label: `quake-panel --debug-window` is visible on the physical DK screen
        - label: Screenshot of DK display shows panel UI even if physical screen is black
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Include permission prompts, DK-Suite running/not running, display rotation, and anything surprising.
    validations:
      required: false
