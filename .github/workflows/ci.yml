name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    name: Validate Swift, plugins, themes, and app bundle
    runs-on: macos-15
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Validate release checks
        run: ./scripts/validate-release.sh
