<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Weather</title>
  <style>
    html, body { margin: 0; height: 100%; background: #071016; color: #f7fcff; font: 16px -apple-system, BlinkMacSystemFont, "SF Pro", sans-serif; }
    body { background: radial-gradient(circle at 82% 12%, #5ce1ff33, transparent 36%), linear-gradient(135deg, #071016, #102b42); }
    main { height: 100%; display: grid; grid-template-columns: 0.9fr 1fr 1fr; gap: 18px; padding: 24px 32px; box-sizing: border-box; }
    h1 { margin: 0; font-size: 64px; line-height: 0.95; font-weight: 300; }
    h2 { margin: 0 0 10px; font-size: 22px; }
    p { margin: 0; color: #b7d8e8; font-size: 18px; }
    .card { border: 1px solid #5cc8ff66; border-radius: 22px; padding: 20px; background: #112638cc; box-shadow: inset 0 1px 0 #ffffff24; overflow: hidden; }
    .current { display: grid; align-content: space-between; }
    .condition { font-size: 24px; color: #fff; margin-top: 8px; }
    .alert { margin-top: 16px; padding-top: 14px; border-top: 1px solid #ffffff33; color: #ffe082; }
    .forecast { display: grid; gap: 10px; }
    .day { display: grid; grid-template-columns: 44px 1fr 42px; gap: 12px; align-items: center; }
    .bar { height: 6px; border-radius: 999px; background: linear-gradient(90deg, #ffe082, #ff708d); }
    .radar { position: relative; min-height: 100%; background: radial-gradient(circle at 50% 50%, #5ce1ff44, transparent 18%), repeating-radial-gradient(circle at 50% 50%, transparent 0 34px, #5cc8ff33 35px 36px); }
    .radar::after { content: ""; position: absolute; inset: 20%; background: conic-gradient(from 210deg, #8dffb166, transparent 42%); border-radius: 50%; }
    .small { font-size: 14px; text-transform: uppercase; letter-spacing: .08em; color: #b7d8e8; }
  </style>
</head>
<body>
  <main>
    <section class="card current">
      <div>
        <p class="small">Charlotte</p>
        <h1>81°</h1>
        <p class="condition">Mostly Cloudy</p>
        <p>H:98° L:76°</p>
      </div>
      <p class="alert">Heat Advisory</p>
    </section>
    <section class="card">
      <h2>Five Day</h2>
      <div class="forecast">
        <div class="day"><strong>Sun</strong><div class="bar"></div><span>95°</span></div>
        <div class="day"><strong>Mon</strong><div class="bar"></div><span>93°</span></div>
        <div class="day"><strong>Tue</strong><div class="bar"></div><span>91°</span></div>
        <div class="day"><strong>Wed</strong><div class="bar"></div><span>87°</span></div>
        <div class="day"><strong>Thu</strong><div class="bar"></div><span>88°</span></div>
      </div>
    </section>
    <section class="card radar">
      <h2>Radar</h2>
      <p>Fallback visual until host-fed radar tiles are connected.</p>
    </section>
  </main>
</body>
</html>
