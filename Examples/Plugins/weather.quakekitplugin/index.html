<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Weather</title>
  <style>
    html, body { margin: 0; height: 100%; background: #071016; color: #f7fcff; font: 16px -apple-system, BlinkMacSystemFont, "SF Pro", sans-serif; }
    main { height: 100%; display: grid; grid-template-columns: 1.1fr 1fr; align-items: center; gap: 32px; padding: 28px 42px; box-sizing: border-box; }
    h1 { margin: 0; font-size: 54px; line-height: 1; }
    p { color: #b7d8e8; font-size: 20px; }
    .card { border: 1px solid #5cc8ff66; border-radius: 8px; padding: 22px; background: #112638d9; }
  </style>
</head>
<body>
  <main>
    <section><h1>72°F</h1><p>Weather canvas placeholder</p></section>
    <section class="card"><p>Ready for host-fed forecast data.</p></section>
  </main>
</body>
</html>
